name: Build & Test

on:
  push:
    branches: [develop, main, "release/*"]
  pull_request:
    branches: [develop, main, "release/*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Build module with Maven
        run: |
          cd openmrs-module-appointmentscheduling
          mvn clean package -DskipTests

      - name: Run unit tests
        run: |
          cd openmrs-module-appointmentscheduling
          mvn test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: openmrs-module-appointmentscheduling/target/surefire-reports/

      - name: SonarQube Analysis (optional)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
        run: |
          cd openmrs-module-appointmentscheduling
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ github.repository }} \
            -Dsonar.sources=src \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_LOGIN }}
        continue-on-error: true

      - name: Build Docker image (test)
        if: github.event_name == 'pull_request'
        run: |
          docker build -f .docker/Dockerfile --build-arg BUILD_ENV=test -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:test-${{ github.sha }} .

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (develop)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: .docker/Dockerfile
          build-args: BUILD_ENV=test
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-latest

      - name: Build and push Docker image (release/* -> acceptance)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
        uses: docker/build-push-action@v4
        with:
          context: .
          file: .docker/Dockerfile
          build-args: BUILD_ENV=acceptance
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:acceptance-${{ github.sha }}

      - name: Build and push Docker image (main -> prod)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: .docker/Dockerfile
          build-args: BUILD_ENV=production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ github.run_number }}
