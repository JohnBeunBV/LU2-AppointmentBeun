name: Deploy to Test

on:
  push:
    branches: [develop]
    paths:
      - "openmrs-module-appointmentscheduling/**"
      - "docker-compose.test.yml"
      - ".github/workflows/deploy-test.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: test
      url: ${{ vars.TEST_SERVER_HOST }}

    steps:
      - uses: actions/checkout@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Test Server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TEST_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.TEST_SERVER_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key ${{ secrets.TEST_SERVER_USER }}@${{ secrets.TEST_SERVER_HOST }} << 'EOF'
            cd /opt/openmrs/test
            docker-compose -f docker-compose.test.yml pull
            docker-compose -f docker-compose.test.yml up -d
            docker-compose -f docker-compose.test.yml logs -f openmrs --tail=50
          EOF

          rm ~/.ssh/deploy_key

      - name: Run integration tests
        run: |
          sleep 30  # Wait for services to be ready
          docker-compose -f docker-compose.test.yml exec -T openmrs \
            curl -f http://localhost:8080/openmrs/admin || exit 1

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Test deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Environment Deployment*\nStatus: *${{ job.status }}*\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
