name: CI/CD Pipeline

on:
  push:
    branches: [develop, main, "release/*"]
  pull_request:
    branches: [develop, main, "release/*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.2.3)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # SAST: Secret scanning — blokkeert bij fund van secrets
  # Mitigeert: CICD-04 (geen geheimscanner)
  # ─────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # False positives: voeg toe aan .gitleaks.toml in de repository-root.

  build-and-test:
    name: Build, Test & SBOM
    needs: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write

    defaults:
      run:
        working-directory: ./openmrs-module-appointmentscheduling

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17 (for SonarQube scanner bootstrap)
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up JDK 8 (build + test)
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      - name: Build and run tests
        run: mvn clean verify -U --no-transfer-progress

      # ── SAST: SonarQube ─────────────────────────────────────────────────────
      # Mitigeert: CICD-03 | NEN-7510: 8.29
      # Hard gate on all branches — no warning-only mode.
      # SONAR_HOST_URL is a repository variable (vars.*), not a secret.
      # SonarQube server bootstrap sends Java-17-compiled scanner JARs,
      # so we temporarily switch JAVA_HOME to JDK 17 for this step only.
      - name: SonarQube Analysis
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true

      - name: Debug - check .snyk file
        working-directory: openmrs-module-appointmentscheduling
        run: |
          echo "=== .snyk file exists? ==="
          ls -la .snyk || echo "NIET GEVONDEN"
          echo "=== Contents ==="
          cat .snyk || echo "KAN NIET LEZEN"
          echo "=== Snyk version ==="
          snyk --version

      # ── SCA: Snyk dependency vulnerability scan ──────────────────────────────
      # Mitigeert: CICD-05 | NEN-7510: 8.8 (kwetsbaarheidsbeheer dependencies)
      # Run via CLI so working-directory is respected (snyk/actions ignores it).
      # Scans all projects including transitive OpenMRS module dependencies.
      # False positives: voeg toe aan .snyk met vervaldatum en onderbouwing.
      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk SCA Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: openmrs-module-appointmentscheduling
        run: |
          snyk test \
            --maven-aggregate-project \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif \
            --json-file-output=snyk-sca.json

      - name: Upload Snyk SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: openmrs-module-appointmentscheduling/snyk.sarif
        continue-on-error: true

      # ── SBOM generatie ────────────────────────────────────────────────────────
      # NEN-7510: 8.8 (inventarisatie componenten) + 8.9 (configuratiebeheer)
      # makeAggregateBom includes all Maven submodules and their transitive deps,
      # covering the openmrs-api, webservices.rest, and reporting modules declared
      # as dependencies in pom.xml.
      - name: Generate SBOM (CycloneDX)
        run: mvn org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom

      - name: Determine version and date
        id: meta
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          DATE=$(date -u '+%Y%m%d')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Store versioned SBOM in repository
        run: |
          mkdir -p ../sbom
          cp target/bom.json ../sbom/sbom-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.date }}.json
          cp target/bom.xml  ../sbom/sbom-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.date }}.xml

      # ── Artefacten uploaden (audit trail voor deze run) ──────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: openmrs-module-appointmentscheduling/**/surefire-reports/**

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.date }}
          path: openmrs-module-appointmentscheduling/**/target/site/jacoco/

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.date }}
          path: |
            openmrs-module-appointmentscheduling/target/bom.json
            openmrs-module-appointmentscheduling/target/bom.xml

      - name: Upload Snyk SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sca-report-${{ steps.meta.outputs.date }}
          path: |
            openmrs-module-appointmentscheduling/snyk.sarif
            openmrs-module-appointmentscheduling/snyk-sca.json

  docker-build:
    name: Build & Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.DEPLOYMENTS_ENABLED == 'true'
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      # Compute BUILD_ENV and image tag from the current branch/event once,
      # so a single build-push step handles all environments.
      - name: Resolve build environment and image tag
        id: resolve
        run: |
          REF="${{ github.ref }}"
          SHA="${{ github.sha }}"
          REGISTRY="${{ env.REGISTRY }}"
          IMAGE="${{ env.IMAGE_NAME }}"

          if [[ "$REF" == "refs/heads/develop" ]]; then
            echo "build_env=test"           >> $GITHUB_OUTPUT
            echo "tags=${REGISTRY}/${IMAGE}:develop-latest" >> $GITHUB_OUTPUT
          elif [[ "$REF" == refs/heads/release/* ]]; then
            echo "build_env=acceptance"     >> $GITHUB_OUTPUT
            echo "tags=${REGISTRY}/${IMAGE}:acceptance-${SHA}" >> $GITHUB_OUTPUT
          else
            echo "build_env=production"     >> $GITHUB_OUTPUT
            echo "tags=${REGISTRY}/${IMAGE}:latest${NEWLINE}${REGISTRY}/${IMAGE}:v${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi
        env:
          NEWLINE: "\n"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .docker/Dockerfile
          build-args: BUILD_ENV=${{ steps.resolve.outputs.build_env }}
          push: true
          tags: ${{ steps.resolve.outputs.tags }}

      # ── Container image vulnerability scan (Trivy) ──────────────────────────
      # Mitigeert: CICD-05 (geen CVE-scan op container image)
      # Hard gate on all environments.
      # False positives: voeg CVE-ID toe aan .trivyignore in de repository-root.
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy — scan container image
        run: |
          IGNORE_FILE=""
          if [ -f .trivyignore ]; then IGNORE_FILE="--ignorefile .trivyignore"; fi

          # Use the first tag from the resolve step (newline-safe: grab first line)
          IMAGE_TAG=$(echo "${{ steps.resolve.outputs.tags }}" | head -1)

          trivy image \
            --format sarif \
            --output trivy-image-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            $IGNORE_FILE \
            "$IMAGE_TAG"

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-container
        continue-on-error: true

  deploy-test:
    name: Deploy to Test
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push' && vars.DEPLOYMENTS_ENABLED == 'true'
    environment:
      name: test
      url: ${{ vars.TEST_SERVER_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.TEST_SSH_KEY }}

      - name: Add known host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TEST_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to Test Server
        run: |
          ssh ${{ secrets.TEST_SERVER_USER }}@${{ secrets.TEST_SERVER_HOST }} << 'EOF'
            cd /opt/openmrs/test
            docker-compose -f docker-compose.test.yml pull
            docker-compose -f docker-compose.test.yml up -d
            docker-compose -f docker-compose.test.yml logs openmrs --tail=50
          EOF

      - name: Health Check
        run: |
          for i in {1..10}; do
            if curl -f http://${{ secrets.TEST_SERVER_HOST }}:8081/openmrs/admin > /dev/null 2>&1; then
              echo "Test health check passed"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 30
          done
          echo "Test health check failed"
          exit 1

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Test deployment: ${{ job.status }}",
              "blocks": [{"type":"section","text":{"type":"mrkdwn","text":"*Test Environment Deployment*\nStatus: *${{ job.status }}*\nCommit: `${{ github.sha }}`"}}]
            }

  deploy-acceptance:
    name: Deploy to Acceptance
    needs: docker-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push' && vars.DEPLOYMENTS_ENABLED == 'true'
    environment:
      name: acceptance
      url: ${{ vars.ACC_SERVER_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACC_SSH_KEY }}

      - name: Add known host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ACC_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to Acceptance Server
        run: |
          ssh ${{ secrets.ACC_SERVER_USER }}@${{ secrets.ACC_SERVER_HOST }} << 'EOF'
            cd /opt/openmrs/acceptance
            docker-compose -f docker-compose.acceptance.yml pull
            docker-compose -f docker-compose.acceptance.yml up -d
            docker-compose -f docker-compose.acceptance.yml logs openmrs --tail=50
          EOF

      - name: Health Check
        run: |
          for i in {1..10}; do
            if curl -f http://${{ secrets.ACC_SERVER_HOST }}:8082/openmrs/admin > /dev/null 2>&1; then
              echo "Acceptance health check passed"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 15
          done
          echo "Acceptance health check failed"
          exit 1

      - name: Slack notification
        if: always()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Acceptance deployment: ${{ job.status }}",
              "blocks": [{"type":"section","text":{"type":"mrkdwn","text":"*Acceptance Environment Deployment*\nStatus: *${{ job.status }}*\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`"}}]
            }

  deploy-prod:
    name: Deploy to Production
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && vars.DEPLOYMENTS_ENABLED == 'true'
    environment:
      name: production
      url: ${{ vars.PROD_SERVER_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use: v1.2.3"
            exit 1
          fi

      - name: Load SSH key into agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add known host key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Database Backup
        run: |
          ssh ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} << 'EOF'
            BACKUP_DIR="/backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p $BACKUP_DIR
            docker-compose -f /opt/openmrs/prod/docker-compose.prod.yml exec -T openmrs-db \
              mysqldump -u"$DB_USER" -p"$DB_PASSWORD" --all-databases > $BACKUP_DIR/openmrs_backup.sql
            echo "Backup created: $BACKUP_DIR"
          EOF

      # Mitigeert CICD-08: vorige image-tag opgeslagen voor automatische rollback.
      - name: Sla vorige image-tag op
        run: |
          PREV_TAG=$(ssh ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "docker inspect --format='{{.Config.Image}}' \$(docker-compose -f /opt/openmrs/prod/docker-compose.prod.yml ps -q openmrs) 2>/dev/null || echo 'none'")
          echo "PREVIOUS_IMAGE=$PREV_TAG" >> $GITHUB_ENV

      - name: Deploy to Production
        run: |
          ssh ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} << 'EOF'
            cd /opt/openmrs/prod
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            sleep 60
            docker-compose -f docker-compose.prod.yml ps
          EOF

      - name: Health Check
        id: health-check
        run: |
          for i in {1..10}; do
            if curl -f https://${{ secrets.PROD_SERVER_HOST }}/openmrs/admin > /dev/null 2>&1; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 10
          done
          echo "Production health check failed"
          exit 1

      # Mitigeert CICD-08: automatische rollback naar vorige image bij health check failure.
      - name: Rollback naar vorige image
        if: failure() && steps.health-check.outcome == 'failure' && env.PREVIOUS_IMAGE != 'none'
        run: |
          echo "Health check mislukt — rollback naar: $PREVIOUS_IMAGE"
          ssh ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} << EOF
            cd /opt/openmrs/prod
            docker-compose -f docker-compose.prod.yml down
            docker pull $PREVIOUS_IMAGE
            OPENMRS_IMAGE=$PREVIOUS_IMAGE docker-compose -f docker-compose.prod.yml up -d
            echo "Rollback voltooid naar: $PREVIOUS_IMAGE"
          EOF

      - name: Slack Success Notification
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Production deployment successful",
              "blocks": [{"type":"section","text":{"type":"mrkdwn","text":"*PRODUCTION DEPLOYMENT SUCCESS*\nVersion: *${{ github.event.inputs.version }}*\nBy: ${{ github.actor }}"}}]
            }

      - name: Slack Failure Notification
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Production deployment FAILED",
              "blocks": [{"type":"section","text":{"type":"mrkdwn","text":"*PRODUCTION DEPLOYMENT FAILED*\nVersion: *${{ github.event.inputs.version }}*\nBy: ${{ github.actor }}\nREQUIRES IMMEDIATE ATTENTION"}}]
            }
