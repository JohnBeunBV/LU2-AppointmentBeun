services:
  openmrs-db:
    image: mysql:5.6
    container_name: openmrs-db-acceptance
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-accroot123}
      MYSQL_DATABASE: ${DB_NAME:-openmrs_acceptance}
      MYSQL_USER: ${DB_USER:-openmrs}
      MYSQL_PASSWORD: ${DB_PASSWORD:-openmrs_acc123}
    ports:
      - "3308:3306"
    volumes:
      - openmrs-db-data-acceptance:/var/lib/mysql
    networks:
      - openmrs-network-acceptance
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-accroot123}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  openmrs:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      args:
        BUILD_ENV: acceptance
    container_name: openmrs-app-acceptance
    depends_on:
      openmrs-db:
        condition: service_healthy
    environment:
      DB_HOST: openmrs-db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-openmrs_acceptance}
      DB_USER: ${DB_USER:-openmrs}
      DB_PASSWORD: ${DB_PASSWORD:-openmrs_acc123}
      OPENMRS_ADMIN_USER: ${OPENMRS_ADMIN_USER:-admin}
      OPENMRS_ADMIN_PASSWORD: ${OPENMRS_ADMIN_PASSWORD:-Acc@123}
      ENVIRONMENT: acceptance
      LOG_LEVEL: INFO
    ports:
      - "8082:8080"
    volumes:
      - openmrs-data-acceptance:/opt/openmrs/data
    networks:
      - openmrs-network-acceptance
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs/"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  openmrs-db-data-acceptance:
  openmrs-data-acceptance:

networks:
  openmrs-network-acceptance:
    driver: bridge
