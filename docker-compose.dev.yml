services:
  openmrs-db:
    image: mysql:5.6
    container_name: openmrs-db-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-devroot123}
      MYSQL_DATABASE: ${DB_NAME:-openmrs_dev}
      MYSQL_USER: ${DB_USER:-openmrs}
      MYSQL_PASSWORD: ${DB_PASSWORD:-openmrs_dev123}
    ports:
      - "3306:3306"
    volumes:
      - openmrs-db-data-dev:/var/lib/mysql
    networks:
      - openmrs-network-dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-devroot123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  openmrs:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      args:
        BUILD_ENV: development
    container_name: openmrs-app-dev
    depends_on:
      openmrs-db:
        condition: service_healthy
    environment:
      DB_HOST: openmrs-db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-openmrs_dev}
      DB_USER: ${DB_USER:-openmrs}
      DB_PASSWORD: ${DB_PASSWORD:-openmrs_dev123}
      OPENMRS_ADMIN_USER: ${OPENMRS_ADMIN_USER:-admin}
      OPENMRS_ADMIN_PASSWORD: ${OPENMRS_ADMIN_USER:-Admin123}
      ENVIRONMENT: development
      OPENMRS_APPLICATION_DATA_DIRECTORY: /opt/openmrs/data
    ports:
      - "8080:8080"
      - "5005:5005"
    volumes:
      - ./openmrs-module-appointmentscheduling:/opt/openmrs/modules/appointmentscheduling
      - openmrs-data-dev:/opt/openmrs/data
    networks:
      - openmrs-network-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs/"]
      timeout: 5s
      retries: 10

volumes:
  openmrs-db-data-dev:
  openmrs-data-dev:

networks:
  openmrs-network-dev:
    driver: bridge
