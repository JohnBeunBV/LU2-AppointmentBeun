services:
  openmrs-db:
    image: mysql:5.6
    container_name: openmrs-db-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:?DB_NAME is required}
      MYSQL_USER: ${DB_USER:?DB_USER is required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - openmrs-db-data-prod:/var/lib/mysql
      - ./backups:/backups
    networks:
      - openmrs-network-prod
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  openmrs:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      args:
        BUILD_ENV: production
    user: openmrs
    container_name: openmrs-app-prod
    depends_on:
      openmrs-db:
        condition: service_healthy
    environment:
      DB_HOST: openmrs-db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      OPENMRS_ADMIN_USER: ${OPENMRS_ADMIN_USER:?OPENMRS_ADMIN_USER is required}
      OPENMRS_ADMIN_PASSWORD: ${OPENMRS_ADMIN_PASSWORD:?OPENMRS_ADMIN_PASSWORD is required}
      ENVIRONMENT: production
      LOG_LEVEL: ERROR
    volumes:
      - openmrs-data-prod:/opt/openmrs/data
      - ./logs:/opt/openmrs/logs
    networks:
      - openmrs-network-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openmrs/"]
      interval: 30s
      timeout: 15s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  openmrs-db-data-prod:
  openmrs-data-prod:

networks:
  openmrs-network-prod:
    driver: bridge
