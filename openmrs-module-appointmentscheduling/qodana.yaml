version: "1.0"

# Qodana JVM Community — free, uses IntelliJ IDEA Community inspections
linter: jetbrains/qodana-jvm-community:latest

projectJDK: "8"

# Exclude generated/vendor code from analysis
exclude:
  - name: All
    paths:
      - target
      - "*/target"

# Inspections to disable (third-party platform code we cannot change)
inspections:
  - group: "category:Java/Probable bugs"
    enabled: true
  - group: "category:Java/Security"
    enabled: true
